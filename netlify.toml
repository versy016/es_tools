# Netlify build + hosting config for the ES Tools React (CRA) PWA.

[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  # CRA treats ESLint warnings as errors when CI is set (which Netlify does) — this
  # repo has warnings, so without CI=false the deploy fails. Keep warnings non-fatal.
  CI = "false"
  NODE_VERSION = "18"
  # Every REACT_APP_* value is baked into the client bundle by design — these are all
  # PUBLIC client-side values (Supabase publishable/anon key + public function URLs),
  # not real secrets, so exempt them from Netlify's secret scanner (which otherwise
  # blocks the build for finding them in the bundle). The real secrets (service-role
  # key, SMTP password) live only on Supabase and must NEVER be a REACT_APP_* var.
  SECRETS_SCAN_OMIT_KEYS = "REACT_APP_SUPABASE_URL,REACT_APP_SUPABASE_PUBLISHABLE_KEY,REACT_APP_EMAIL_ENDPOINT,REACT_APP_DOCX_PDF_ENDPOINT,REACT_APP_REPORT_ARCHIVE_EMAIL,REACT_APP_GOOGLE_CLIENT_ID"

# Single-page-app fallback: serve index.html for any path that isn't a real file,
# so client-side (react-router) routes work on refresh / deep links. Real files
# (JS, CSS, /service-worker.js, /manifest.json, images) are served before this rule.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Always re-validate the service worker so a new deploy is picked up promptly.
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache"
